<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | SoFiss</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1 class="logo">SoFiss</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="checkout-layout">
  <div class="checkout-card">
    <h2>Shipping Details</h2>
    <form id="checkout-form" class="contact-form" onsubmit="placeOrder(event)">
      <input type="text" id="full-name" placeholder="Full Name" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      <input type="email" id="email" placeholder="Email" required>
      <textarea id="address" placeholder="Full Address" rows="4" required></textarea>

      <h3 class="form-title">Payment Method</h3>
      <label class="payment-option"><input type="radio" name="payment" value="UPI" checked> UPI</label>
      <label class="payment-option"><input type="radio" name="payment" value="Card"> Card</label>
      <label class="payment-option"><input type="radio" name="payment" value="Cash on Delivery"> Cash on Delivery</label>

      <button type="submit" class="btn">Place Order</button>
    </form>
  </div>

  <div class="checkout-card">
    <h2>Order Summary</h2>
    <div id="checkout-items"></div>
    <div class="summary-row"><span>Subtotal</span><strong id="summary-subtotal">₹0</strong></div>
    <div class="summary-row"><span>Delivery</span><strong id="summary-delivery">₹0</strong></div>
    <div class="summary-row total"><span>Total</span><strong id="summary-total">₹0</strong></div>
    <p id="checkout-empty" class="subtle-text"></p>
  </div>
</section>

<footer>
  <p>Secure checkout powered by SoFiss ordering system.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
