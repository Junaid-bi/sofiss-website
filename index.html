<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SoFiss | Nourish The Goodness</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:#fafafa;
color:#222;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#0c3b2e;
color:white;
}

.logo{
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

nav a{
margin:0 15px;
text-decoration:none;
color:white;
font-size:16px;
}

.cart{
font-size:18px;
}

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1604908177522-4323b4c40d2c");
background-size:cover;
background-position:center;
color:white;
text-align:center;
}

.hero h1{
font-size:52px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
margin-bottom:25px;
}

.hero button{
background:#d4af37;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

.products{
padding:70px 80px;
text-align:center;
}

.products h2{
font-size:36px;
margin-bottom:40px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin:15px 0 10px;
}

.price{
font-weight:bold;
margin-bottom:15px;
}

button{
background:#0c3b2e;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.cart-panel{
position:fixed;
right:0;
top:0;
height:100%;
width:300px;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
padding:20px;
display:none;
}

.cart-panel h2{
margin-bottom:20px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<div class="logo">SoFiss</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="cart" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

</header>


<section class="hero">

<h1>Premium Dry Fruits</h1>
<p>Nourish The Goodness</p>

<button onclick="scrollToProducts()">Shop Now</button>

</section>


<section class="products" id="products">

<h2>Our Products</h2>

<div class="product-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1508747703725-719777637510">
<h3>California Almonds</h3>
<p class="price">₹149</p>
<button onclick="addToCart('Almonds')">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1590080875515-8a3a8dc5735e">
<h3>Premium Cashews</h3>
<p class="price">₹199</p>
<button onclick="addToCart('Cashews')">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1604908554007-80b0e9c2dcb1">
<h3>Dry Fruit Mix</h3>
<p class="price">₹99</p>
<button onclick="addToCart('Mix')">Add to Cart</button>
</div>

</div>

</section>


<div class="cart-panel" id="cart-panel">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<br>

<button onclick="orderNow()">Order on WhatsApp</button>

</div>


<footer>

<p>© 2026 SoFiss</p>
<p>Srinagar, Kashmir</p>

</footer>


<script>

let cart=[]

function addToCart(product){

cart.push(product)

document.getElementById("cart-count").innerText=cart.length

renderCart()

}

function renderCart(){

let container=document.getElementById("cart-items")

container.innerHTML=""

cart.forEach((item,index)=>{

container.innerHTML+=`
<div class="cart-item">
${item}
<button onclick="removeItem(${index})">❌</button>
</div>
`

})

}

function removeItem(index){

cart.splice(index,1)

document.getElementById("cart-count").innerText=cart.length

renderCart()

}

function toggleCart(){

let panel=document.getElementById("cart-panel")

panel.style.display=panel.style.display==="block"?"none":"block"

}

function scrollToProducts(){

document.getElementById("products").scrollIntoView({behavior:"smooth"})

}

function orderNow(){

let message="Hello, I want to order:\n"

cart.forEach(p=>message+=p+"\n")

window.open("https://wa.me/91XXXXXXXXXX?text="+encodeURIComponent(message))

}

</script>

</body>
</html>
