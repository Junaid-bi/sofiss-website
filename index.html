<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SoFiss | Nourish The Goodness</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fafafa;
color:#222;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#0c3b2e;
color:white;
position:sticky;
top:0;
}

.logo{
font-size:26px;
font-weight:600;
letter-spacing:2px;
}

.cart{
cursor:pointer;
font-size:18px;
}

/* HERO */

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
url("https://images.unsplash.com/photo-1604908177522-4323b4c40d2c");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero button{
background:#d4af37;
border:none;
padding:14px 30px;
border-radius:6px;
cursor:pointer;
}

/* PRODUCTS */

.products{
padding:70px 8%;
text-align:center;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin:15px 0 10px;
}

select,input{
padding:8px;
margin:6px 0;
width:100%;
}

.card button{
background:#0c3b2e;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
width:100%;
}

/* CART */

.cart-panel{
position:fixed;
right:0;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,.2);
padding:25px;
display:none;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
font-weight:600;
margin-top:20px;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:32px;
}

}

</style>

</head>


<body>


<header>

<div class="logo">SoFiss</div>

<div class="cart" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

</header>


<section class="hero">

<h1>Luxury Dry Fruits</h1>

<p>Nourish The Goodness</p>

<button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
Shop Now
</button>

</section>


<section class="products" id="products">

<h2>Our Products</h2>

<br>

<div class="product-grid">


<div class="card">

<img src="https://images.unsplash.com/photo-1508747703725-719777637510">

<h3>California Almonds</h3>

<select id="almond-size">
<option value="149">100g - ₹149</option>
<option value="269">200g - ₹269</option>
<option value="349">250g - ₹349</option>
</select>

<input type="number" id="almond-qty" value="1" min="1">

<button onclick="addProduct('Almonds','almond-size','almond-qty')">
Add to Cart
</button>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1590080875515-8a3a8dc5735e">

<h3>Premium Cashews</h3>

<select id="cashew-size">
<option value="199">100g - ₹199</option>
<option value="329">200g - ₹329</option>
<option value="399">250g - ₹399</option>
</select>

<input type="number" id="cashew-qty" value="1" min="1">

<button onclick="addProduct('Cashews','cashew-size','cashew-qty')">
Add to Cart
</button>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1604908554007-80b0e9c2dcb1">

<h3>Dry Fruit Mix</h3>

<select id="mix-size">
<option value="99">100g - ₹99</option>
<option value="149">200g - ₹149</option>
<option value="199">250g - ₹199</option>
</select>

<input type="number" id="mix-qty" value="1" min="1">

<button onclick="addProduct('Mix','mix-size','mix-qty')">
Add to Cart
</button>

</div>

</div>

</section>


<div class="cart-panel" id="cart-panel">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<p class="total">Total: ₹<span id="total">0</span></p>

<br>

<button onclick="checkout()">Order on WhatsApp</button>

</div>


<footer>

<p>© 2026 SoFiss</p>
<p>Srinagar, Kashmir</p>

</footer>


<script>

let cart=[]
let total=0

function addProduct(name,sizeId,qtyId){

let price=document.getElementById(sizeId).value
let qty=document.getElementById(qtyId).value

let cost=price*qty

cart.push({name,price,qty,cost})

total+=cost

updateCart()

}

function updateCart(){

let container=document.getElementById("cart-items")

container.innerHTML=""

cart.forEach((item,index)=>{

container.innerHTML+=`
<div class="cart-item">
${item.name} x${item.qty} - ₹${item.cost}
<button onclick="removeItem(${index})">❌</button>
</div>
`

})

document.getElementById("cart-count").innerText=cart.length
document.getElementById("total").innerText=total

}

function removeItem(index){

total-=cart[index].cost
cart.splice(index,1)

updateCart()

}

function toggleCart(){

let panel=document.getElementById("cart-panel")

panel.style.display=panel.style.display==="block"?"none":"block"

}

function checkout(){

let message="Hello SoFiss, I want to order:\n"

cart.forEach(item=>{
message+=`${item.name} x${item.qty} - ₹${item.cost}\n`
})

message+=`\nTotal: ₹${total}`

window.open("https://wa.me/91XXXXXXXXXX?text="+encodeURIComponent(message))

}

</script>

</body>
</html>
