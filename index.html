<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SoFiss | Nourish The Goodness</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#fafafa;
color:#222;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:white;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:26px;
font-weight:600;
color:#14532d;
}

nav a{
margin:0 15px;
text-decoration:none;
color:#333;
font-weight:500;
}

.cart{
cursor:pointer;
font-weight:600;
}

.hero{
height:80vh;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1604908176997-4317a8c7d0cb");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1{
font-size:60px;
letter-spacing:2px;
}

.hero p{
font-size:22px;
margin-top:10px;
}

.products{
padding:80px 60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.card{
background:white;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
padding:20px;
text-align:center;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:12px;
}

.price{
font-size:20px;
margin:10px 0;
font-weight:600;
color:#14532d;
}

button{
background:#14532d;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#0f3d21;
}

.cart-panel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.1);
padding:30px;
transition:0.4s;
display:flex;
flex-direction:column;
}

.cart-panel.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:15px 0;
font-size:15px;
}

.checkout{
margin-top:auto;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
font-weight:600;
text-decoration:none;
}

footer{
margin-top:80px;
padding:40px;
background:#14532d;
color:white;
text-align:center;
}

</style>
</head>


<body>

<header>

<div class="logo">SoFiss</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">About</a>
</nav>

<div class="cart" onclick="toggleCart()">
Cart (<span id="cart-count">0</span>)
</div>

</header>


<section class="hero">

<div>
<h1>SoFiss</h1>
<p>Nourish The Goodness</p>
</div>

</section>


<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1508747703725-719777637510">
<h3>California Almonds</h3>
<div class="price">₹149</div>
<button onclick="addToCart('Almonds',149)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1615486363976-54a61d5bb0f7">
<h3>Premium Cashews</h3>
<div class="price">₹199</div>
<button onclick="addToCart('Cashews',199)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1614707267537-b85aaf00c4b7">
<h3>Energy Mix</h3>
<div class="price">₹99</div>
<button onclick="addToCart('Mix Fruit',99)">Add to Cart</button>
</div>

</section>


<div class="cart-panel" id="cartPanel">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="checkout">
<button onclick="checkout()">Checkout</button>
</div>

</div>


<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">
Order on WhatsApp
</a>


<footer>

<p>© 2026 SoFiss Premium Dry Fruits</p>

</footer>



<script>

let cart=[]
let count=0

function addToCart(name,price){

cart.push({name,price})
count++

document.getElementById("cart-count").innerText=count

renderCart()

}

function renderCart(){

let items=document.getElementById("cartItems")

items.innerHTML=""

cart.forEach((item,index)=>{

items.innerHTML+=`

<div class="cart-item">

${item.name} - ₹${item.price}

<button onclick="removeItem(${index})">X</button>

</div>

`

})

}

function removeItem(index){

cart.splice(index,1)

count--

document.getElementById("cart-count").innerText=count

renderCart()

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("active")

}

function checkout(){

alert("Thank you for ordering from SoFiss!")

cart=[]
count=0

document.getElementById("cart-count").innerText=0

renderCart()

}

</script>

</body>
</html>
